# SonarQube 项目配置文件
# 适用于 Mall Demo 项目的多语言扫描配置

# =============================================================================
# 通用配置
# =============================================================================

# 项目标识
sonar.projectKey=mall-demo
sonar.projectName=Mall Demo
sonar.projectVersion=1.0.0

# 项目描述
sonar.projectDescription=Mall Demo - Cloud Native Microservices

# 源代码编码
sonar.sourceEncoding=UTF-8

# =============================================================================
# 源代码路径配置
# =============================================================================

# 源代码目录（相对于项目根目录）
sonar.sources=.

# 排除路径（不扫描的文件/目录）
sonar.exclusions=\
  **/vendor/**,\
  **/node_modules/**,\
  **/bin/**,\
  **/target/**,\
  **/build/**,\
  **/dist/**,\
  **/*.pb.go,\
  **/*_test.go,\
  **/*Test.java,\
  **/test/**,\
  **/tests/**,\
  **/docs/**,\
  **/generated/**,\
  **/proto/**,\
  **/mocks/**,\
  **/mock/**

# 测试代码路径
sonar.tests=.
sonar.test.inclusions=\
  **/*_test.go,\
  **/*Test.java,\
  **/test/**/*.java

# =============================================================================
# 代码覆盖率配置
# =============================================================================

# Go 覆盖率报告路径
sonar.go.coverage.reportPaths=\
  coverage.out,\
  coverage-gateway.out,\
  coverage-user.out,\
  coverage-order.out,\
  coverage-inventory.out,\
  coverage-payment.out,\
  coverage-notification.out

# Java 覆盖率报告路径 (JaCoCo)
sonar.coverage.jacoco.xmlReportPaths=\
  target/site/jacoco/jacoco.xml,\
  */target/site/jacoco/jacoco.xml,\
  */*/target/site/jacoco/jacoco.xml

# 通用覆盖率报告路径
sonar.coverageReportPaths=\
  coverage.xml

# =============================================================================
# 语言特定配置
# =============================================================================

# Java 配置
sonar.java.source=17
sonar.java.target=17
sonar.java.binaries=target/classes
sonar.java.libraries=target/dependency/*.jar

# Go 配置
sonar.go.file.suffixes=.go
sonar.go.exclusions=vendor/**,**/vendor/**

# JavaScript/TypeScript 配置
sonar.javascript.file.suffixes=.js,.jsx,.vue
sonar.typescript.file.suffixes=.ts,.tsx
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# HTML 配置
sonar.html.file.suffixes=.html,.htm,.vue

# CSS 配置
sonar.css.file.suffixes=.css,.scss,.less

# XML 配置
sonar.xml.file.suffixes=.xml,.xsd,.xsl

# =============================================================================
# 质量门禁配置
# =============================================================================

# 等待质量门禁结果
sonar.qualitygate.wait=true

# 质量门禁超时时间（秒）
sonar.qualitygate.timeout=300

# =============================================================================
# 分析配置
# =============================================================================

# 增量分析（只分析变更的文件）
# sonar.inclusions=src/**

# 分支分析
sonar.branch.name=${env.CI_COMMIT_BRANCH}
sonar.branch.target=main

# Pull Request 分析（GitLab）
sonar.pullrequest.key=${env.CI_MERGE_REQUEST_IID}
sonar.pullrequest.branch=${env.CI_MERGE_REQUEST_SOURCE_BRANCH_NAME}
sonar.pullrequest.base=${env.CI_MERGE_REQUEST_TARGET_BRANCH_NAME}

# SCM 配置
sonar.scm.provider=git
sonar.scm.disabled=false

# =============================================================================
# 问题检测配置
# =============================================================================

# 重复代码检测
sonar.cpd.exclusions=\
  **/generated/**,\
  **/proto/**,\
  **/*.pb.go

# 忽略规则（按规则ID）
# sonar.issue.ignore.multicriteria=e1,e2
# sonar.issue.ignore.multicriteria.e1.ruleKey=java:S106
# sonar.issue.ignore.multicriteria.e1.resourceKey=**/test/**

# 忽略问题（按文件路径）
# sonar.issue.ignore.allfile=**

# =============================================================================
# 安全相关配置
# =============================================================================

# 安全热点检查
sonar.security.hotspots.active=true

# 敏感数据检测
sonar.security.sensitiveData.active=true

# =============================================================================
# 报告配置
# =============================================================================

# 生成 HTML 报告
sonar.report.export.path=sonar-report.html

# 详细日志
sonar.verbose=false

# 显示已跳过的单元测试
sonar.junit.reportPaths=\
  target/surefire-reports,\
  */target/surefire-reports

# 测试执行报告
sonar.testExecutionReportPaths=report.json

# =============================================================================
# 外部工具集成
# =============================================================================

# OWASP Dependency Check 报告
sonar.dependencyCheck.htmlReportPath=target/dependency-check-report.html
sonar.dependencyCheck.jsonReportPath=target/dependency-check-report.json
sonar.dependencyCheck.summarize=true
sonar.dependencyCheck.securityHotspot=true

# Trivy 报告（通过通用问题导入）
# sonar.externalIssuesReportPaths=trivy-report.json

# =============================================================================
# 性能优化配置
# =============================================================================

# 分析线程数
sonar.parallel=true

# 文件缓存大小
sonar.file.size.limit=20MB

# 排除大文件
sonar.exclusions=**/*.min.js,**/*.min.css

# =============================================================================
# 多模块项目配置示例（取消注释使用）
# =============================================================================

# sonar.modules=demo-a,demo-b,demo-c

# Demo A - Spring Boot
# demo-a.sonar.projectName=Mall Demo A - Spring Boot
# demo-a.sonar.projectBaseDir=demo-a-springboot
# demo-a.sonar.sources=.
# demo-a.sonar.java.binaries=target/classes
# demo-a.sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Demo B - Go
# demo-b.sonar.projectName=Mall Demo B - Go
# demo-b.sonar.projectBaseDir=demo-b-golang
# demo-b.sonar.sources=.
# demo-b.sonar.go.coverage.reportPaths=coverage.out

# Demo C - Hybrid
# demo-c.sonar.projectName=Mall Demo C - Hybrid
# demo-c.sonar.projectBaseDir=demo-c-hybrid
# demo-c.sonar.sources=.
# demo-c.sonar.go.coverage.reportPaths=api-gateway/coverage.out,user-service/coverage.out
# demo-c.sonar.coverage.jacoco.xmlReportPaths=order-service/target/site/jacoco/jacoco.xml

# =============================================================================
# 环境变量占位符（由 CI/CD 注入）
# =============================================================================

# sonar.host.url=${env.SONAR_HOST_URL}
# sonar.token=${env.SONAR_TOKEN}
# sonar.login=${env.SONAR_LOGIN}
# sonar.password=${env.SONAR_PASSWORD}

# =============================================================================
# 备注
# =============================================================================

# 1. 此配置文件应放在项目根目录
# 2. 敏感信息（token、password）应通过环境变量传递
# 3. 覆盖率报告需要在运行 sonar-scanner 之前生成
# 4. 多模块项目需要为每个模块单独配置
