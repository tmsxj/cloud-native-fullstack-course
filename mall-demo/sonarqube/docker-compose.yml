# SonarQube 10.x 离线部署配置
# 包含 SonarQube + PostgreSQL

version: "3.8"

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: sonarqube_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    volumes:
      - /data/postgresql/data:/var/lib/postgresql/data
      - /data/postgresql/backup:/backup
    networks:
      - sonarqube-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  # SonarQube 服务
  sonarqube:
    image: sonarqube:10.3-community
    container_name: sonarqube
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # 数据库配置
      SONAR_JDBC_URL: jdbc:postgresql://postgres:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
      
      # Elasticsearch 配置
      SONAR_SEARCH_JAVAOPTS: "-Xmx2g -Xms2g -XX:+UseG1GC"
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
      
      # Web 服务配置
      SONAR_WEB_JAVAOPTS: "-Xmx1g -Xms1g"
      SONAR_WEB_PORT: "9000"
      
      # 计算引擎配置
      SONAR_CE_JAVAOPTS: "-Xmx2g -Xms2g"
      
      # 数据库连接池配置
      SONAR_JDBC_MAXACTIVE: "60"
      SONAR_JDBC_MAXIDLE: "10"
      SONAR_JDBC_MINIDLE: "5"
      
      # 日志配置
      SONAR_LOG_LEVEL: "INFO"
      SONAR_LOG_CONSOLE: "true"
      
    ports:
      - "9000:9000"
    volumes:
      # 数据持久化
      - /data/sonarqube/data:/opt/sonarqube/data
      - /data/sonarqube/logs:/opt/sonarqube/logs
      - /data/sonarqube/extensions:/opt/sonarqube/extensions
      # 时区配置
      - /etc/localtime:/etc/localtime:ro
    networks:
      - sonarqube-network
    ulimits:
      nproc: 65535
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9000/api/system/status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '2'
          memory: 2G

networks:
  sonarqube-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

