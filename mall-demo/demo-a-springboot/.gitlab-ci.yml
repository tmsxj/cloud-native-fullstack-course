# =============================================================================
# DEPLOY STAGE - 部署阶段
# =============================================================================

deploy:trigger-argocd:
  stage: deploy
  image: alpine/curl:latest
  needs:
    - job: push:user-service
    - job: push:order-service
    - job: push:inventory-service
    - job: push:payment-service
    - job: push:notification-service
    - job: push:api-gateway
  script:
    - |
      echo "Triggering ArgoCD sync for all services..."
      for service in user-service order-service inventory-service payment-service notification-service api-gateway; do
        echo "Syncing $ARGOCD_APP_PREFIX-$service..."
        curl -X POST "$ARGOCD_SERVER/api/v1/applications/$ARGOCD_APP_PREFIX-$service/sync"
          -H "Authorization: Bearer $ARGOCD_TOKEN"
          -H "Content-Type: application/json"
          -d '{"prune": true, "dryRun": false, "strategy": {"hook": {"force": false}}}'
      done
  environment:
    name: production
    url: http://mall-demo.local
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
    - if: $CI_COMMIT_BRANCH =~ /^release\/.*/
      when: manual

deploy:kubectl:
  stage: deploy
  image: bitnami/kubectl:latest
  needs:
    - job: push:user-service
    - job: push:order-service
    - job: push:inventory-service
    - job: push:payment-service
    - job: push:notification-service
    - job: push:api-gateway
  script:
    - kubectl config use-context $K8S_CONTEXT
    - kubectl set image deployment/user-service
      user-service=$HARBOR_REGISTRY/$HARBOR_PROJECT/user-service:$IMAGE_TAG
      -n $K8S_NAMESPACE
    - kubectl set image deployment/order-service
      order-service=$HARBOR_REGISTRY/$HARBOR_PROJECT/order-service:$IMAGE_TAG
      -n $K8S_NAMESPACE
    - kubectl set image deployment/inventory-service
      inventory-service=$HARBOR_REGISTRY/$HARBOR_PROJECT/inventory-service:$IMAGE_TAG
      -n $K8S_NAMESPACE
    - kubectl set image deployment/payment-service
      payment-service=$HARBOR_REGISTRY/$HARBOR_PROJECT/payment-service:$IMAGE_TAG
      -n $K8S_NAMESPACE
    - kubectl set image deployment/notification-service
      notification-service=$HARBOR_REGISTRY/$HARBOR_PROJECT/notification-service:$IMAGE_TAG
      -n $K8S_NAMESPACE
    - kubectl set image deployment/api-gateway
      api-gateway=$HARBOR_REGISTRY/$HARBOR_PROJECT/api-gateway:$IMAGE_TAG
      -n $K8S_NAMESPACE
    - kubectl rollout status deployment/user-service -n $K8S_NAMESPACE --timeout=300s
    - kubectl rollout status deployment/order-service -n $K8S_NAMESPACE --timeout=300s
    - kubectl rollout status deployment/inventory-service -n $K8S_NAMESPACE --timeout=300s
    - kubectl rollout status deployment/payment-service -n $K8S_NAMESPACE --timeout=300s
    - kubectl rollout status deployment/notification-service -n $K8S_NAMESPACE --timeout=300s
    - kubectl rollout status deployment/api-gateway -n $K8S_NAMESPACE --timeout=300s
  environment:
    name: production
    url: http://mall-demo.local
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
    - if: $CI_COMMIT_BRANCH =~ /^release\/.*/
      when: manual

# =============================================================================
# 辅助任务
# =============================================================================

# 生成SBOM
sbom:generate:
  stage: .post
  image: maven:3.9-eclipse-temurin-17-alpine
  needs:
    - job: package:user-service
      artifacts: true
    - job: package:order-service
      artifacts: true
    - job: package:inventory-service
      artifacts: true
    - job: package:payment-service
      artifacts: true
    - job: package:notification-service
      artifacts: true
    - job: package:api-gateway
      artifacts: true
  script:
    - mvn $MAVEN_CLI_OPTS org.cyclonedx:cyclonedx-maven-plugin:makeAggregateBom
  artifacts:
    paths:
      - target/bom.xml
      - target/bom.json
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH =~ /^release\/.*/
  allow_failure: true

# 清理工作
cleanup:
  stage: .post
  image: alpine:latest
  script:
    - echo "Cleaning up temporary artifacts..."
  when: always
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH =~ /^release\/.*/
