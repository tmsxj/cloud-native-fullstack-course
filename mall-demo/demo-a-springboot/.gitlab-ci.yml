      artifacts: true
    - job: security:trivy-fs-scan
    - job: security:sonarqube
  script:
    - cd user-service
    - mvn $MAVEN_CLI_OPTS package -DskipTests
  artifacts:
    paths:
      - user-service/target/*.jar
    expire_in: 1 week
