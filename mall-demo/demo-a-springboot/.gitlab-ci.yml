# GitLab CI/CD Configuration for Demo-A Spring Boot Microservices
# 支持6个服务并行构建: user-service, order-service, inventory-service, payment-service, notification-service, api-gateway
# 阶段: build → test → security → package → push → deploy

variables:
  # Maven配置
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository -Dorg.slf4j.simpleLogger.showDateTime=true -Djava.awt.headless=true"
  MAVEN_CLI_OPTS: "--batch-mode --errors --fail-at-end --show-version"

  # Harbor镜像仓库配置
  HARBOR_REGISTRY: "192.168.1.61:80"
  HARBOR_PROJECT: "mall-demo"
  IMAGE_TAG: "$CI_COMMIT_SHORT_SHA"

  # SonarQube配置
  SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
  GIT_DEPTH: "0"

  # K8s配置
  K8S_NAMESPACE: "mall-demo-a"
  ARGOCD_APP_PREFIX: "demo-a"

# 定义阶段
stages:
  - build
  - test
  - security
  - package
  - push
  - deploy

# 全局缓存配置
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .m2/repository/

# 定义服务列表
.services:
  - &service_user "user-service"
  - &service_order "order-service"
  - &service_inventory "inventory-service"
  - &service_payment "payment-service"
  - &service_notification "notification-service"
  - &service_gateway "api-gateway"

# =============================================================================
# BUILD STAGE - 编译阶段
# =============================================================================

build:user-service:
  stage: build
  image: maven:3.9-eclipse-temurin-17-alpine
  script:
    - cd user-service
    - mvn $MAVEN_CLI_OPTS compile
  artifacts:
    paths:
      - user-service/target/classes/
    expire_in: 1 hour
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH =~ /^feature\/.*/
    - if: $CI_COMMIT_BRANCH =~ /^release\/.*/

