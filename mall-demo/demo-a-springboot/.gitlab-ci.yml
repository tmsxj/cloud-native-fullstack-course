      artifacts: true
  script:
    - cd user-service
    - mvn $MAVEN_CLI_OPTS test
  artifacts:
    when: always
    reports:
      junit:
        - user-service/target/surefire-reports/TEST-*.xml
    paths:
      - user-service/target/surefire-reports/
      - user-service/target/site/jacoco/
  coverage: '/Total.*?([0-9]{1,3})%/'
