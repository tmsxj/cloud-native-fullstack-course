# =============================================================================
# SECURITY STAGE - 安全扫描阶段
# =============================================================================

# Trivy文件系统扫描
security:trivy-fs-scan:
  stage: security
  image: aquasec/trivy:latest
  needs:
    - job: build:user-service
      artifacts: false
    - job: build:order-service
      artifacts: false
    - job: build:inventory-service
      artifacts: false
    - job: build:payment-service
      artifacts: false
    - job: build:notification-service
      artifacts: false
    - job: build:api-gateway
      artifacts: false
  script:
    - trivy filesystem --scanners vuln,secret,config --format table --exit-code 0 --severity HIGH,CRITICAL .
    - trivy filesystem --scanners vuln,secret,config --format json -o trivy-fs-report.json --exit-code 0 .
    - trivy filesystem --scanners vuln,secret,config --format sarif -o trivy-fs-report.sarif --exit-code 0 .
  artifacts:
    when: always
    paths:
      - trivy-fs-report.json
      - trivy-fs-report.sarif
    reports:
      sast: trivy-fs-report.sarif
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH =~ /^release\/.*/

# SonarQube代码分析
security:sonarqube:
  stage: security
  image: maven:3.9-eclipse-temurin-17-alpine
  needs:
    - job: test:user-service
      artifacts: true
    - job: test:order-service
      artifacts: true
    - job: test:inventory-service
      artifacts: true
    - job: test:payment-service
      artifacts: true
    - job: test:notification-service
      artifacts: true
    - job: test:api-gateway
      artifacts: true
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
    GIT_DEPTH: "0"
  script:
    - |
      mvn $MAVEN_CLI_OPTS sonar:sonar \
        -Dsonar.host.url=$SONAR_HOST_URL \
        -Dsonar.token=$SONAR_TOKEN \
        -Dsonar.projectKey=mall-demo-a \
        -Dsonar.projectName="Mall Demo A - Spring Boot" \
        -Dsonar.qualitygate.wait=true \
        -Dsonar.coverage.jacoco.xmlReportPaths=\
          user-service/target/site/jacoco/jacoco.xml,\
          order-service/target/site/jacoco/jacoco.xml,\
          inventory-service/target/site/jacoco/jacoco.xml,\
          payment-service/target/site/jacoco/jacoco.xml,\
          notification-service/target/site/jacoco/jacoco.xml,\
          api-gateway/target/site/jacoco/jacoco.xml
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH =~ /^release\/.*/

# 依赖漏洞扫描 (OWASP Dependency Check)
security:dependency-check:
  stage: security
  image: maven:3.9-eclipse-temurin-17-alpine
  needs: []
  script:
    - mvn $MAVEN_CLI_OPTS org.owasp:dependency-check-maven:check -DfailBuildOnCVSS=9
  artifacts:
    when: always
    paths:
      - target/dependency-check-report.html
      - target/dependency-check-report.json
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH =~ /^release\/.*/

