server:
  port: 8080

spring:
  application:
    name: inventory-service
  datasource:
    url: jdbc:mysql://${DB_HOST:192.168.1.61}:${DB_PORT:3306}/${DB_NAME:mall_inventory}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:Harbor12345}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  data:
    redis:
      host: ${REDIS_HOST:192.168.1.61}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:Harbor12345}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: inventory-service

otel:
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:otel-collector.monitoring:4317}
  service:
    name: inventory-service
  resource:
    attributes:
      deployment.environment: ${DEPLOY_ENV:production}
