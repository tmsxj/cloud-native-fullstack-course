# =============================================================================
# PUSH STAGE - 镜像构建和推送阶段
# =============================================================================

# 模板: Docker构建和推送
.docker_build_template: &docker_build
  image: docker:24-dind
  services:
    - docker:24-dind
  before_script:
    - echo "$HARBOR_PASSWORD" | docker login -u "$HARBOR_USER" --password-stdin $HARBOR_REGISTRY
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_DRIVER: overlay2

# Go服务镜像推送
push:api-gateway-go:
  stage: push
  <<: *docker_build
  needs:
    - job: package:api-gateway-go
      artifacts: true
  script:
    - docker build -f api-gateway/Dockerfile -t $HARBOR_REGISTRY/$HARBOR_PROJECT/demo-c-api-gateway:$IMAGE_TAG .
    - docker tag $HARBOR_REGISTRY/$HARBOR_PROJECT/demo-c-api-gateway:$IMAGE_TAG $HARBOR_REGISTRY/$HARBOR_PROJECT/demo-c-api-gateway:latest
    - docker push $HARBOR_REGISTRY/$HARBOR_PROJECT/demo-c-api-gateway:$IMAGE_TAG
