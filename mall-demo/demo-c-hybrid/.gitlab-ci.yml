# GitLab CI/CD Configuration for Demo-C Hybrid Microservices
# 混合构建: Go服务 + Spring Boot服务
# 阶段: build → test → security → package → push → deploy

variables:
  # Maven配置
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository -Dorg.slf4j.simpleLogger.showDateTime=true -Djava.awt.headless=true"
  MAVEN_CLI_OPTS: "--batch-mode --errors --fail-at-end --show-version"

  # Go配置
  GO_VERSION: "1.21"
  GOPROXY: "https://goproxy.cn,direct"
  GOSUMDB: "off"
  CGO_ENABLED: "0"
  GOOS: "linux"
  GOARCH: "amd64"

  # Harbor镜像仓库配置
  HARBOR_REGISTRY: "192.168.1.61:80"
  HARBOR_PROJECT: "mall-demo"
  IMAGE_TAG: "$CI_COMMIT_SHORT_SHA"

  # SonarQube配置
  SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
  GIT_DEPTH: "0"

  # K8s配置
  K8S_NAMESPACE: "mall-demo-c"
  ARGOCD_APP_PREFIX: "demo-c"

# 定义阶段
stages:
  - build
  - test
  - security
  - package
  - push
  - deploy

# =============================================================================
# 缓存配置
# =============================================================================

.maven_cache: &maven_cache
  key: maven-${CI_COMMIT_REF_SLUG}
  paths:
    - .m2/repository/

.go_cache: &go_cache
  key: go-${CI_COMMIT_REF_SLUG}
  paths:
    - /go/pkg/mod/
    - .go-cache/

# =============================================================================
# BUILD STAGE - 编译阶段 (Go服务)
# =============================================================================

build:api-gateway-go:
  stage: build
  image: golang:${GO_VERSION}-alpine
  cache:
    <<: *go_cache
  before_script:
    - apk add --no-cache git make
    - go env -w GOPROXY=${GOPROXY}
    - go env -w GOSUMDB=${GOSUMDB}
  script:
    - cd api-gateway
    - go mod download
    - go build -v -o ../bin/api-gateway .
  artifacts:
    paths:
      - bin/api-gateway
    expire_in: 1 hour
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH =~ /^feature\/.*/
    - if: $CI_COMMIT_BRANCH =~ /^release\/.*/

build:user-service-go:
  stage: build
  image: golang:${GO_VERSION}-alpine
  cache:
    <<: *go_cache
