# =============================================================================
# DEPLOY STAGE - 部署阶段
# =============================================================================

deploy:trigger-argocd:
  stage: deploy
  image: alpine/curl:latest
  needs:
    - job: push:api-gateway-go
    - job: push:user-service-go
    - job: push:payment-service-go
    - job: push:notification-service-go
    - job: push:order-service-java
    - job: push:inventory-service-java
  script:
    - |
      echo "Triggering ArgoCD sync for all services..."
      for service in api-gateway user-service payment-service notification-service order-service inventory-service; do
        echo "Syncing $ARGOCD_APP_PREFIX-$service..."
        curl -X POST "$ARGOCD_SERVER/api/v1/applications/$ARGOCD_APP_PREFIX-$service/sync"
          -H "Authorization: Bearer $ARGOCD_TOKEN"
          -H "Content-Type: application/json"
          -d '{"prune": true, "dryRun": false, "strategy": {"hook": {"force": false}}}'
      done
  environment:
    name: production
    url: http://mall-demo.local
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
    - if: $CI_COMMIT_BRANCH =~ /^release\/.*/
      when: manual

deploy:kubectl:
  stage: deploy
  image: bitnami/kubectl:latest
  needs:
    - job: push:api-gateway-go
    - job: push:user-service-go
    - job: push:payment-service-go
    - job: push:notification-service-go
    - job: push:order-service-java
    - job: push:inventory-service-java
  script:
    - kubectl config use-context $K8S_CONTEXT
    # Go服务
    - kubectl set image deployment/api-gateway
      api-gateway=$HARBOR_REGISTRY/$HARBOR_PROJECT/demo-c-api-gateway:$IMAGE_TAG
      -n $K8S_NAMESPACE
    - kubectl set image deployment/user-service
      user-service=$HARBOR_REGISTRY/$HARBOR_PROJECT/demo-c-user-service:$IMAGE_TAG
      -n $K8S_NAMESPACE
    - kubectl set image deployment/payment-service
      payment-service=$HARBOR_REGISTRY/$HARBOR_PROJECT/demo-c-payment-service:$IMAGE_TAG
      -n $K8S_NAMESPACE
    - kubectl set image deployment/notification-service
      notification-service=$HARBOR_REGISTRY/$HARBOR_PROJECT/demo-c-notification-service:$IMAGE_TAG
      -n $K8S_NAMESPACE
    # Java服务
    - kubectl set image deployment/order-service
      order-service=$HARBOR_REGISTRY/$HARBOR_PROJECT/demo-c-order-service:$IMAGE_TAG
      -n $K8S_NAMESPACE
    - kubectl set image deployment/inventory-service
      inventory-service=$HARBOR_REGISTRY/$HARBOR_PROJECT/demo-c-inventory-service:$IMAGE_TAG
      -n $K8S_NAMESPACE
    # 等待滚动更新完成
    - kubectl rollout status deployment/api-gateway -n $K8S_NAMESPACE --timeout=300s
    - kubectl rollout status deployment/user-service -n $K8S_NAMESPACE --timeout=300s
    - kubectl rollout status deployment/payment-service -n $K8S_NAMESPACE --timeout=300s
    - kubectl rollout status deployment/notification-service -n $K8S_NAMESPACE --timeout=300s
    - kubectl rollout status deployment/order-service -n $K8S_NAMESPACE --timeout=300s
    - kubectl rollout status deployment/inventory-service -n $K8S_NAMESPACE --timeout=300s
  environment:
    name: production
    url: http://mall-demo.local
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
    - if: $CI_COMMIT_BRANCH =~ /^release\/.*/
      when: manual

# =============================================================================
# 辅助任务
# =============================================================================

# 生成SBOM
sbom:generate:
  stage: .post
  image: golang:${GO_VERSION}-alpine
  needs:
    - job: package:api-gateway-go
      artifacts: true
    - job: package:user-service-go
      artifacts: true
    - job: package:payment-service-go
      artifacts: true
    - job: package:notification-service-go
      artifacts: true
    - job: package:order-service-java
      artifacts: true
    - job: package:inventory-service-java
      artifacts: true
  before_script:
    - apk add --no-cache curl
    - curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
  script:
    # Go项目SBOM
    - syft packages dir:api-gateway -o cyclonedx-json > sbom-api-gateway.json
    - syft packages dir:user-service -o cyclonedx-json > sbom-user-service.json
    - syft packages dir:payment-service -o cyclonedx-json > sbom-payment-service.json
    - syft packages dir:notification-service -o cyclonedx-json > sbom-notification-service.json
    # Java项目SBOM (使用Maven插件)
    - cd order-service && mvn $MAVEN_CLI_OPTS org.cyclonedx:cyclonedx-maven-plugin:makeBom
    - cd ../inventory-service && mvn $MAVEN_CLI_OPTS org.cyclonedx:cyclonedx-maven-plugin:makeBom
  artifacts:
    paths:
      - sbom-*.json
      - order-service/target/bom.json
      - inventory-service/target/bom.json
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH =~ /^release\/.*/
  allow_failure: true

# 清理工作
cleanup:
  stage: .post
  image: alpine:latest
  script:
    - echo "Cleaning up temporary artifacts..."
  when: always
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH =~ /^release\/.*/
