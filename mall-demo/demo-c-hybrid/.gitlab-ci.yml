    - go env -w GOPROXY=${GOPROXY}
    - go env -w GOSUMDB=${GOSUMDB}
  script:
    - cd api-gateway
    - go build -ldflags="-s -w -X main.version=$CI_COMMIT_SHA -X main.buildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)" -o ../bin/api-gateway .
  artifacts:
