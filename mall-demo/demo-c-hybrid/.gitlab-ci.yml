# =============================================================================
# SECURITY STAGE - 安全扫描阶段
# =============================================================================

# Trivy文件系统扫描
security:trivy-fs-scan:
  stage: security
  image: aquasec/trivy:latest
  needs:
    - job: build:api-gateway-go
      artifacts: false
    - job: build:user-service-go
      artifacts: false
    - job: build:payment-service-go
      artifacts: false
    - job: build:notification-service-go
      artifacts: false
    - job: build:order-service-java
      artifacts: false
    - job: build:inventory-service-java
      artifacts: false
  script:
    - trivy filesystem --scanners vuln,secret,config --format table --exit-code 0 --severity HIGH,CRITICAL .
    - trivy filesystem --scanners vuln,secret,config --format json -o trivy-fs-report.json --exit-code 0 .
    - trivy filesystem --scanners vuln,secret,config --format sarif -o trivy-fs-report.sarif --exit-code 0 .
  artifacts:
    when: always
    paths:
      - trivy-fs-report.json
      - trivy-fs-report.sarif
    reports:
      sast: trivy-fs-report.sarif
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH =~ /^release\/.*/

# Gosec安全扫描 (Go服务)
security:gosec:
  stage: security
  image: securego/gosec:latest
  needs:
    - job: build:api-gateway-go
      artifacts: false
  script:
    - gosec -fmt sarif -out gosec-report.sarif ./api-gateway/... ./user-service/... ./payment-service/... ./notification-service/... || true
    - gosec -fmt json -out gosec-report.json ./api-gateway/... ./user-service/... ./payment-service/... ./notification-service/... || true
  artifacts:
    when: always
    paths:
      - gosec-report.sarif
      - gosec-report.json
    reports:
      sast: gosec-report.sarif
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH =~ /^release\/.*/

# Go依赖漏洞扫描
security:govulncheck:
  stage: security
  image: golang:${GO_VERSION}-alpine
  needs: []
  before_script:
    - go env -w GOPROXY=${GOPROXY}
    - go env -w GOSUMDB=${GOSUMDB}
    - go install golang.org/x/vuln/cmd/govulncheck@latest
  script:
    - govulncheck -format sarif ./api-gateway/... ./user-service/... ./payment-service/... ./notification-service/... > govulncheck-report.sarif || true
    - govulncheck -format json ./api-gateway/... ./user-service/... ./payment-service/... ./notification-service/... > govulncheck-report.json || true
  artifacts:
    when: always
    paths:
      - govulncheck-report.sarif
      - govulncheck-report.json
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH =~ /^release\/.*/

# Maven依赖漏洞扫描
security:dependency-check:
  stage: security
  image: maven:3.9-eclipse-temurin-17-alpine
  cache:
    <<: *maven_cache
  needs: []
  script:
    - cd order-service && mvn $MAVEN_CLI_OPTS org.owasp:dependency-check-maven:check -DfailBuildOnCVSS=9
    - cd ../inventory-service && mvn $MAVEN_CLI_OPTS org.owasp:dependency-check-maven:check -DfailBuildOnCVSS=9
  artifacts:
    when: always
    paths:
      - order-service/target/dependency-check-report.html
      - order-service/target/dependency-check-report.json
      - inventory-service/target/dependency-check-report.html
      - inventory-service/target/dependency-check-report.json
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH =~ /^release\/.*/

# SonarQube代码分析
security:sonarqube:
  stage: security
  image: sonarsource/sonar-scanner-cli:latest
  needs:
    - job: test:api-gateway-go
      artifacts: true
    - job: test:user-service-go
      artifacts: true
    - job: test:payment-service-go
      artifacts: true
    - job: test:notification-service-go
      artifacts: true
    - job: test:order-service-java
      artifacts: true
    - job: test:inventory-service-java
      artifacts: true
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
    GIT_DEPTH: "0"
  script:
    - |
      sonar-scanner \
        -Dsonar.host.url=$SONAR_HOST_URL \
        -Dsonar.token=$SONAR_TOKEN \
        -Dsonar.projectKey=mall-demo-c \
        -Dsonar.projectName="Mall Demo C - Hybrid" \
        -Dsonar.sources=. \
        -Dsonar.exclusions="**/vendor/**,**/bin/**,**/target/**" \
        -Dsonar.go.coverage.reportPaths="api-gateway/coverage.out,user-service/coverage.out,payment-service/coverage.out,notification-service/coverage.out" \
        -Dsonar.coverage.jacoco.xmlReportPaths="order-service/target/site/jacoco/jacoco.xml,inventory-service/target/site/jacoco/jacoco.xml" \
        -Dsonar.qualitygate.wait=true
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH =~ /^release\/.*/

