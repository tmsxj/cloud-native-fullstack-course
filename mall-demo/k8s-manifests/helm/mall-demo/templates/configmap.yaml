apiVersion: v1
kind: ConfigMap
metadata:
  name: mall-config
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "mall-demo.labels" (dict "name" "mall-config" "Chart" .Chart "Release" .Release) | nindent 4 }}
data:
  DB_HOST: {{ .Values.global.db.host | quote }}
  DB_PORT: {{ .Values.global.db.port | quote }}
  DB_USERNAME: {{ .Values.global.db.username | quote }}
  DB_PASSWORD: {{ .Values.global.db.password | quote }}
  REDIS_HOST: {{ .Values.global.redis.host | quote }}
  REDIS_PORT: {{ .Values.global.redis.port | quote }}
  REDIS_PASSWORD: {{ .Values.global.redis.password | quote }}
  KAFKA_BROKERS: {{ .Values.global.kafka.brokers | quote }}
  NACOS_HOST: {{ .Values.global.nacos.host | quote }}
  NACOS_PORT: {{ .Values.global.nacos.port | quote }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.global.otel.endpoint | quote }}
  DEPLOY_ENV: "production"
  USER_DB_NAME: {{ .Values.userService.dbName | quote }}
  ORDER_DB_NAME: {{ .Values.orderService.dbName | quote }}
  INVENTORY_DB_NAME: {{ .Values.inventoryService.dbName | quote }}
  PAYMENT_DB_NAME: {{ .Values.paymentService.dbName | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: mall-secrets
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "mall-demo.labels" (dict "name" "mall-secrets" "Chart" .Chart "Release" .Release) | nindent 4 }}
type: Opaque
stringData:
  db-password: {{ .Values.global.db.password | quote }}
  redis-password: {{ .Values.global.redis.password | quote }}
