{{- if .Values.orderService.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: {{ .Values.global.namespace }}
  labels:
    app: order-service
    {{- include "mall-demo.labels" (dict "name" "order-service" "Chart" .Chart "Release" .Release) | nindent 4 }}
spec:
  replicas: {{ .Values.orderService.replicaCount }}
  selector:
    matchLabels:
      app: order-service
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: order-service
      annotations:
        {{- include "mall-demo.prometheusAnnotations" (dict "metricsPath" .Values.serviceMonitor.path) | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
        - name: order-service
          image: {{ .Values.global.imageRegistry }}/{{ .Values.imagePrefix }}-{{ .Values.orderService.image }}:{{ .Values.global.imageTag }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: SERVER_PORT
              value: "8080"
            {{- include "mall-demo.dbEnv" (dict "Values" .Values "dbName" .Values.orderService.dbName) | nindent 12 }}
            {{- include "mall-demo.redisEnv" (dict "Values" .Values) | nindent 12 }}
            {{- include "mall-demo.kafkaEnv" (dict "Values" .Values) | nindent 12 }}
            {{- include "mall-demo.otelEnv" (dict "Values" .Values "serviceName" "order-service") | nindent 12 }}
            - name: INVENTORY_SERVICE_URL
              value: "http://inventory-service:8080"
            - name: PAYMENT_SERVICE_URL
              value: "http://payment-service:8080"
          resources:
            {{- toYaml .Values.orderService.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      {{- include "mall-demo.topologySpread" (dict "Values" .Values "serviceName" "order-service") | nindent 6 }}
      {{- include "mall-demo.antiAffinity" (dict "serviceName" "order-service") | nindent 6 }}
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: {{ .Values.global.namespace }}
  labels:
    app: order-service
    {{- include "mall-demo.labels" (dict "name" "order-service" "Chart" .Chart "Release" .Release) | nindent 4 }}
spec:
  type: {{ .Values.orderService.service.type }}
  ports:
    - port: {{ .Values.orderService.service.port }}
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: order-service
{{- end }}
