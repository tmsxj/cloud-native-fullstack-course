    - docker push $HARBOR_REGISTRY/$HARBOR_PROJECT/order-svc:$IMAGE_TAG
    - docker push $HARBOR_REGISTRY/$HARBOR_PROJECT/order-svc:latest
    - docker run --rm -v /var/run/docker.sock:/var/run/docker.sock
      aquasec/trivy image --exit-code 0 --severity HIGH,CRITICAL
      $HARBOR_REGISTRY/$HARBOR_PROJECT/order-svc:$IMAGE_TAG
