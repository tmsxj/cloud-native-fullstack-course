    - docker run --rm -v /var/run/docker.sock:/var/run/docker.sock
      aquasec/trivy image --exit-code 0 --severity HIGH,CRITICAL
      $HARBOR_REGISTRY/$HARBOR_PROJECT/notification-svc:$IMAGE_TAG
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH =~ /^release\/.*/

push:gateway:
  stage: push
  <<: *docker_build
  needs:
    - job: package:gateway
      artifacts: true
  script:
    - docker build -f docker/Dockerfile.gateway -t $HARBOR_REGISTRY/$HARBOR_PROJECT/gateway:$IMAGE_TAG .
    - docker tag $HARBOR_REGISTRY/$HARBOR_PROJECT/gateway:$IMAGE_TAG $HARBOR_REGISTRY/$HARBOR_PROJECT/gateway:latest
    - docker push $HARBOR_REGISTRY/$HARBOR_PROJECT/gateway:$IMAGE_TAG
    - docker push $HARBOR_REGISTRY/$HARBOR_PROJECT/gateway:latest
    - docker run --rm -v /var/run/docker.sock:/var/run/docker.sock
      aquasec/trivy image --exit-code 0 --severity HIGH,CRITICAL
      $HARBOR_REGISTRY/$HARBOR_PROJECT/gateway:$IMAGE_TAG
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH =~ /^release\/.*/

# =============================================================================
# DEPLOY STAGE - 部署阶段
# =============================================================================

deploy:trigger-argocd:
  stage: deploy
  image: alpine/curl:latest
  needs:
    - job: push:user-svc
    - job: push:order-svc
    - job: push:inventory-svc
    - job: push:payment-svc
    - job: push:notification-svc
    - job: push:gateway
  script:
    - |
      echo "Triggering ArgoCD sync for all services..."
      for service in user-svc order-svc inventory-svc payment-svc notification-svc gateway; do
        echo "Syncing $ARGOCD_APP_PREFIX-$service..."
        curl -X POST "$ARGOCD_SERVER/api/v1/applications/$ARGOCD_APP_PREFIX-$service/sync"
          -H "Authorization: Bearer $ARGOCD_TOKEN"
          -H "Content-Type: application/json"
          -d '{"prune": true, "dryRun": false, "strategy": {"hook": {"force": false}}}'
      done
  environment:
    name: production
    url: http://mall-demo.local
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
    - if: $CI_COMMIT_BRANCH =~ /^release\/.*/
      when: manual

deploy:kubectl:
  stage: deploy
  image: bitnami/kubectl:latest
  needs:
    - job: push:user-svc
    - job: push:order-svc
    - job: push:inventory-svc
    - job: push:payment-svc
    - job: push:notification-svc
    - job: push:gateway
  script:
    - kubectl config use-context $K8S_CONTEXT
    - kubectl set image deployment/user-svc
      user-svc=$HARBOR_REGISTRY/$HARBOR_PROJECT/user-svc:$IMAGE_TAG
      -n $K8S_NAMESPACE
    - kubectl set image deployment/order-svc
      order-svc=$HARBOR_REGISTRY/$HARBOR_PROJECT/order-svc:$IMAGE_TAG
      -n $K8S_NAMESPACE
    - kubectl set image deployment/inventory-svc
      inventory-svc=$HARBOR_REGISTRY/$HARBOR_PROJECT/inventory-svc:$IMAGE_TAG
      -n $K8S_NAMESPACE
    - kubectl set image deployment/payment-svc
      payment-svc=$HARBOR_REGISTRY/$HARBOR_PROJECT/payment-svc:$IMAGE_TAG
      -n $K8S_NAMESPACE
    - kubectl set image deployment/notification-svc
      notification-svc=$HARBOR_REGISTRY/$HARBOR_PROJECT/notification-svc:$IMAGE_TAG
      -n $K8S_NAMESPACE
    - kubectl set image deployment/gateway
      gateway=$HARBOR_REGISTRY/$HARBOR_PROJECT/gateway:$IMAGE_TAG
      -n $K8S_NAMESPACE
    - kubectl rollout status deployment/user-svc -n $K8S_NAMESPACE --timeout=300s
    - kubectl rollout status deployment/order-svc -n $K8S_NAMESPACE --timeout=300s
    - kubectl rollout status deployment/inventory-svc -n $K8S_NAMESPACE --timeout=300s
    - kubectl rollout status deployment/payment-svc -n $K8S_NAMESPACE --timeout=300s
    - kubectl rollout status deployment/notification-svc -n $K8S_NAMESPACE --timeout=300s
    - kubectl rollout status deployment/gateway -n $K8S_NAMESPACE --timeout=300s
  environment:
    name: production
    url: http://mall-demo.local
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
    - if: $CI_COMMIT_BRANCH =~ /^release\/.*/
      when: manual

# =============================================================================
# 辅助任务
# =============================================================================

# 生成SBOM
sbom:generate:
  stage: .post
  image: golang:${GO_VERSION}-alpine
  needs:
    - job: package:user-svc
      artifacts: true
    - job: package:order-svc
      artifacts: true
    - job: package:inventory-svc
      artifacts: true
    - job: package:payment-svc
      artifacts: true
    - job: package:notification-svc
      artifacts: true
    - job: package:gateway
      artifacts: true
  before_script:
    - apk add --no-cache curl
    - curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
  script:
    - syft packages dir:. -o cyclonedx-json > sbom.json
    - syft packages dir:. -o spdx-json > sbom-spdx.json
  artifacts:
    paths:
      - sbom.json
      - sbom-spdx.json
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH =~ /^release\/.*/
  allow_failure: true

# 清理工作
cleanup:
  stage: .post
  image: alpine:latest
  script:
    - echo "Cleaning up temporary artifacts..."
  when: always
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH =~ /^release\/.*/
