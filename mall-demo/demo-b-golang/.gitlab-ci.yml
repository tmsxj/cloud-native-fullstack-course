test:user-svc:
  stage: test
  <<: *go_build
  needs:
    - job: build:user-svc
      artifacts: false
  script:
    - go test -v -race -coverprofile=coverage-user.out -covermode=atomic ./internal/user/...
    - go tool cover -html=coverage-user.out -o coverage-user.html
  artifacts:
    when: always
    reports:
      junit: report-user.xml
    paths:
      - coverage-user.out
      - coverage-user.html
  coverage: '/total:\s*\(statements\)\s*(\d+\.?\d*)%/'
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH =~ /^release\/.*/

