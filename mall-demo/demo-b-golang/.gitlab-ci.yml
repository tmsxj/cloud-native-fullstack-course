# GitLab CI/CD Configuration for Demo-B Go Microservices
# 支持6个服务并行构建: user-svc, order-svc, inventory-svc, payment-svc, notification-svc, gateway
# 阶段: build → test → security → package → push → deploy

variables:
  # Go配置
  GO_VERSION: "1.21"
  GOPROXY: "https://goproxy.cn,direct"
  GOSUMDB: "off"
  CGO_ENABLED: "0"
  GOOS: "linux"
  GOARCH: "amd64"

  # Harbor镜像仓库配置
  HARBOR_REGISTRY: "192.168.1.61:80"
  HARBOR_PROJECT: "mall-demo"
  IMAGE_TAG: "$CI_COMMIT_SHORT_SHA"

  # SonarQube配置
  SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
  GIT_DEPTH: "0"

  # K8s配置
  K8S_NAMESPACE: "mall-demo-b"
  ARGOCD_APP_PREFIX: "demo-b"

# 定义阶段
stages:
  - build
  - test
  - security
  - package
  - push
  - deploy

# 全局缓存配置
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - /go/pkg/mod/
    - .go-cache/

# Go模块模板
.go_template: &go_build
  image: golang:${GO_VERSION}-alpine
  before_script:
    - apk add --no-cache git make
    - go env -w GOPROXY=${GOPROXY}
    - go env -w GOSUMDB=${GOSUMDB}
    - go mod download

# =============================================================================
# BUILD STAGE - 编译阶段
# =============================================================================

build:user-svc:
  stage: build
  <<: *go_build
  script:
    - cd cmd/user-svc
    - go build -v -o ../../bin/user-svc .
  artifacts:
    paths:
      - bin/user-svc
    expire_in: 1 hour
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH =~ /^feature\/.*/
    - if: $CI_COMMIT_BRANCH =~ /^release\/.*/

build:order-svc:
