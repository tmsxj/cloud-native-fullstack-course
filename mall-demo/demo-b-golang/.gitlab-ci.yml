# =============================================================================
# PUSH STAGE - 镜像构建和推送阶段
# =============================================================================

# 模板: Docker构建和推送
.docker_build_template: &docker_build
  image: docker:24-dind
  services:
    - docker:24-dind
  before_script:
    - echo "$HARBOR_PASSWORD" | docker login -u "$HARBOR_USER" --password-stdin $HARBOR_REGISTRY
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_DRIVER: overlay2

push:user-svc:
  stage: push
  <<: *docker_build
  needs:
    - job: package:user-svc
      artifacts: true
  script:
    - docker build -f docker/Dockerfile.user-svc -t $HARBOR_REGISTRY/$HARBOR_PROJECT/user-svc:$IMAGE_TAG .
    - docker tag $HARBOR_REGISTRY/$HARBOR_PROJECT/user-svc:$IMAGE_TAG $HARBOR_REGISTRY/$HARBOR_PROJECT/user-svc:latest
    - docker push $HARBOR_REGISTRY/$HARBOR_PROJECT/user-svc:$IMAGE_TAG
    - docker push $HARBOR_REGISTRY/$HARBOR_PROJECT/user-svc:latest
    # Trivy镜像扫描
    - docker run --rm -v /var/run/docker.sock:/var/run/docker.sock
      aquasec/trivy image --exit-code 0 --severity HIGH,CRITICAL
      $HARBOR_REGISTRY/$HARBOR_PROJECT/user-svc:$IMAGE_TAG
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH =~ /^release\/.*/

push:order-svc:
  stage: push
