# =============================================================================
# SECURITY STAGE - 安全扫描阶段
# =============================================================================

# Trivy文件系统扫描
security:trivy-fs-scan:
  stage: security
  image: aquasec/trivy:latest
  needs:
    - job: build:user-svc
      artifacts: false
    - job: build:order-svc
      artifacts: false
    - job: build:inventory-svc
      artifacts: false
    - job: build:payment-svc
      artifacts: false
    - job: build:notification-svc
      artifacts: false
    - job: build:gateway
      artifacts: false
  script:
    - trivy filesystem --scanners vuln,secret,config --format table --exit-code 0 --severity HIGH,CRITICAL .
    - trivy filesystem --scanners vuln,secret,config --format json -o trivy-fs-report.json --exit-code 0 .
    - trivy filesystem --scanners vuln,secret,config --format sarif -o trivy-fs-report.sarif --exit-code 0 .
  artifacts:
    when: always
    paths:
      - trivy-fs-report.json
      - trivy-fs-report.sarif
    reports:
      sast: trivy-fs-report.sarif
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH =~ /^release\/.*/

# Gosec安全扫描
security:gosec:
  stage: security
  image: securego/gosec:latest
  needs:
    - job: build:user-svc
      artifacts: false
  script:
    - gosec -fmt sarif -out gosec-report.sarif ./...
    - gosec -fmt json -out gosec-report.json ./...
  artifacts:
    when: always
    paths:
      - gosec-report.sarif
      - gosec-report.json
    reports:
      sast: gosec-report.sarif
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH =~ /^release\/.*/

# Go依赖漏洞扫描 (govulncheck)
security:govulncheck:
  stage: security
  image: golang:${GO_VERSION}-alpine
  needs: []
  before_script:
    - go env -w GOPROXY=${GOPROXY}
    - go env -w GOSUMDB=${GOSUMDB}
    - go install golang.org/x/vuln/cmd/govulncheck@latest
  script:
    - govulncheck -format sarif ./... > govulncheck-report.sarif || true
    - govulncheck -format json ./... > govulncheck-report.json || true
  artifacts:
    when: always
    paths:
      - govulncheck-report.sarif
      - govulncheck-report.json
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH =~ /^release\/.*/

# SonarQube代码分析
security:sonarqube:
  stage: security
  image:
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  needs:
    - job: test:user-svc
      artifacts: true
    - job: test:order-svc
      artifacts: true
    - job: test:inventory-svc
      artifacts: true
    - job: test:payment-svc
      artifacts: true
    - job: test:notification-svc
      artifacts: true
    - job: test:gateway
      artifacts: true
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
    GIT_DEPTH: "0"
  script:
    - |
      sonar-scanner \
        -Dsonar.host.url=$SONAR_HOST_URL \
        -Dsonar.token=$SONAR_TOKEN \
        -Dsonar.projectKey=mall-demo-b \
        -Dsonar.projectName="Mall Demo B - Go" \
        -Dsonar.language=go \
        -Dsonar.sources=. \
        -Dsonar.exclusions="**/vendor/**,**/bin/**,**/*_test.go" \
        -Dsonar.tests=. \
        -Dsonar.test.inclusions="**/*_test.go" \
        -Dsonar.go.coverage.reportPaths="coverage-user.out,coverage-order.out,coverage-inventory.out,coverage-payment.out,coverage-notification.out,coverage-gateway.out" \
        -Dsonar.qualitygate.wait=true
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH =~ /^release\/.*/

# =============================================================================
# PACKAGE STAGE - 打包阶段
# =============================================================================

package:user-svc:
  stage: package
  <<: *go_build
  needs:
    - job: build:user-svc
      artifacts: true
    - job: security:trivy-fs-scan
    - job: security:gosec
    - job: security:sonarqube
  script:
    - cd cmd/user-svc
    - go build -ldflags="-s -w -X main.version=$CI_COMMIT_SHA -X main.buildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)" -o ../../bin/user-svc .
  artifacts:
    paths:
      - bin/user-svc
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
